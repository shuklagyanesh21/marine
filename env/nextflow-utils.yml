# Minimal Nextflow helper env for lightweight Python wrapper steps.
# This is separate from env/environment.yml because that environment mixes
# Python-version-constrained bioinfo tools (e.g. CheckM2) that are unsuitable
# for per-process Nextflow conda creation.
name: marine-nextflow-utils
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pyyaml=6.0.2
