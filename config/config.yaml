# Central configuration. No hardcoded paths or parameters in code or scripts:
# read everything from here and use relative paths (see AGENTS.md).

# ---------------------------------------------------------------------------
# Directory layout (relative to project root)
# ---------------------------------------------------------------------------
paths:
  data_raw: data/raw
  data_external: data/external
  data_interim: data/interim
  data_processed: data/processed
  results: results
  models: models
  logs: logs
  manifest: data/processed/genome_manifest.tsv  # committed provenance table

# ---------------------------------------------------------------------------
# GTDB release + metadata inputs (read-only; downloaded under data/metadata)
# ---------------------------------------------------------------------------
gtdb:
  release: "r220"
  metadata_dir: data/metadata/gtdb
  bac120_metadata: data/metadata/gtdb/bac120_metadata_r220.tsv
  ar122_metadata: data/metadata/gtdb/ar53_metadata_r220.tsv

# ---------------------------------------------------------------------------
# Marine genome selection (manifest build). No genomes are downloaded here;
# this only decides WHICH accessions to download later.
#
#   Tier 1  GTDB metadata keyword match (offline; high precision).
#   Tier 2  NCBI BioSample ENVO/env_* attributes (recovers marine MAGs/SAGs
#           whose environment annotation never made it into GTDB metadata).
# ---------------------------------------------------------------------------
marine:
  # Intermediate + final outputs
  candidates_tier1: data/interim/marine_candidates_tier1.tsv
  tier2_pool: data/interim/tier2_pool.tsv
  tier2_query_ids: data/interim/tier2_biosamples.txt
  biosample_cache: data/interim/biosample_attributes.tsv
  candidates_tier2: data/interim/marine_candidates_tier2.tsv
  manifest: data/processed/genome_manifest.tsv

  # --- Keyword matching (case-insensitive, whole-word) -------------------
  # A genome is marine if an include term matches and no exclude term does.
  include_keywords:
    - marine
    - seawater
    - "sea water"
    - "sea-water"
    - "ocean"
    - oceanic
    - "open ocean"
    - "coastal"
    - "deep sea"
    - "deep-sea"
    - abyssal
    - hadal
    - bathypelagic
    - mesopelagic
    - epipelagic
    - pelagic
    - "water column"
    - "hydrothermal vent"
    - "cold seep"
    - "hydrothermal"
    - estuary
    - estuarine
    - intertidal
    - "tidal flat"
    - mangrove
    - brackish
    - "salt marsh"
    - "marine sediment"
    - "deep-sea sediment"
    - "deep sea sediment"
    - "sea ice"
    - "brine pool"
    - "continental shelf"
    - fjord
    - lagoon
    - "coral reef"
    - "reef"
    # broad-scale ENVO terms seen in BioSample env_broad_scale/env_medium
    - "marine biome"
    - "marine water body"
    - "marine pelagic biome"
    - "marine benthic biome"
    - "ocean biome"
    - "coast"

  # Exclude terms veto a match (avoid freshwater/terrestrial false positives
  # and e.g. "Marine Drive" street names).
  exclude_keywords:
    - freshwater
    - "fresh water"
    - lake
    - river
    - pond
    - stream
    - groundwater
    - aquifer
    - "drinking water"
    - "tap water"
    - wastewater
    - "waste water"
    - sewage
    - sludge
    - "activated sludge"
    - soil
    - rhizosphere
    - compost
    - glacier
    - "hot spring"
    - "marine drive"
    - "marine corps"

  # Genomes whose ONLY marine signal is host association get tagged
  # (is_host_associated=True) so you can include/exclude them downstream.
  host_keywords:
    - sponge
    - coral
    - "marine sponge"
    - "fish"
    - "gut of"
    - mollusc
    - mollusk
    - oyster
    - mussel
    - crustacean
    - shrimp
    - copepod
    - algae
    - alga
    - seaweed
    - kelp
    - diatom
    - "marine invertebrate"
    - whale
    - dolphin
    - "sea cucumber"
    - tunicate
    - ascidian

  tier1:
    # GTDB metadata columns scanned for include/exclude/host terms
    match_fields: [ncbi_isolation_source, ncbi_country, ncbi_organism_name]

  tier2:
    enabled: true
    # Only query genomes that are environmental (MAG/SAG/env sample), have a
    # BioSample, and were NOT already flagged marine by Tier 1.
    genome_categories:
      - "derived from metagenome"
      - "derived from single cell"
      - "derived from environmental sample"
    # NCBI E-utilities (raw HTTP; EDirect wrapper not required)
    eutils_base: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils"
    batch_size: 200          # biosample IDs per efetch request
    requests_per_second: 3   # 3 w/o API key, up to 10 with NCBI_API_KEY env var
    # BioSample harmonized attribute names scanned for marine terms
    match_fields:
      - env_broad_scale
      - env_local_scale
      - env_medium
      - isolation_source
      - geo_loc_name

# ---------------------------------------------------------------------------
# Genome QC thresholds (MIMAG-style; tune as needed)
# ---------------------------------------------------------------------------
qc:
  min_completeness: 50.0   # percent (CheckM2)
  max_contamination: 5.0   # percent (CheckM2)

# ---------------------------------------------------------------------------
# Dereplication
# ---------------------------------------------------------------------------
dereplication:
  ani_threshold: 95.0      # percent ANI for species-level clustering
  ani_thresholds: [95.0, 99.0]
  min_alignment_fraction: 0.5
  contamination_weight: 5.0
  input_index: data/interim/genomes/index.tsv
  work_dir: data/interim/dereplication
  genome_list: data/interim/dereplication/genome_list.txt
  sketch_dir: data/interim/dereplication/sketches
  edges_tsv: data/interim/dereplication/skani_edges.tsv
  checkm2_quality: data/interim/checkm2/quality_report.tsv
  source_priority: [ncbi, marref, mardb, gomc, gorg, oceandna]
  skani:
    screen: 90
    min_af: 15
    threads: 20
  clusters_tsv_pattern: data/processed/derep_clusters_ani{t}.tsv
  representatives_tsv_pattern: data/processed/genome_representatives_ani{t}.tsv
  representatives_dir_pattern: data/interim/dereplication/representatives_ani{t}

# ---------------------------------------------------------------------------
# ORF / peptide prediction
# ---------------------------------------------------------------------------
orf:
  min_protein_length: 10   # amino acids
  genetic_code: 11         # bacterial/archaeal translation table

# SmORFinder annotates small proteins (<50 aa) with a TensorFlow model.
# Requires the separate smorfinder conda env (env/smorfinder.yml, Python 3.8).
smorfinder:
  conda_env: smorfinder
  # One-time model download after env create: conda activate smorfinder && smorf
  out_dir: data/interim/smorfinder
  # CLI: smorf single <genome.fna>  |  smorf meta <metagenome.fna>

# ---------------------------------------------------------------------------
# Compute (placeholders; wired into Nextflow process resources later)
# ---------------------------------------------------------------------------
resources:
  max_cpus: 8
  max_memory_gb: 32

# ---------------------------------------------------------------------------
# Tier 3 curated marine catalogs
# ---------------------------------------------------------------------------
tier3:
  enabled: true
  disk_budget_gb: 320
  order: [marref, gorg, mardb, oceandna, gomc]
  tier12_raw_root: data/raw/ncbi_dataset/data
  out_root: data/raw/tier3
  interim_root: data/interim/tier3
  manifest: data/processed/tier3_manifest.tsv

  marref:
    metadata_tsv: data/metadata/tier3/MarRef/MarRef_1.8.tsv
    accession_col: "acc:assembly_genbank"
    out_dir: data/raw/tier3/marref
    interim_dir: data/interim/tier3/marref
    inventory_tsv: data/interim/tier3/marref/inventory.tsv
    accession_list: data/interim/tier3/marref/accessions.txt
    metadata_snapshot: data/interim/tier3/marref/metadata.tsv

  gorg:
    ena_project: PRJEB33281
    filereport_url: "https://www.ebi.ac.uk/ena/portal/api/filereport"
    metadata_tsv: data/metadata/tier3/GORG-tropics/gorg_wgs_set.tsv
    out_dir: data/raw/tier3/gorg
    interim_dir: data/interim/tier3/gorg
    inventory_tsv: data/interim/tier3/gorg/inventory.tsv

  mardb:
    metadata_tsv: data/metadata/tier3/MarDB/MarDB_1.7.tsv
    accession_col: "acc:assembly_genbank"
    out_dir: data/raw/tier3/mardb
    interim_dir: data/interim/tier3/mardb
    inventory_tsv: data/interim/tier3/mardb/inventory.tsv
    accession_list: data/interim/tier3/mardb/accessions.txt
    metadata_snapshot: data/interim/tier3/mardb/metadata.tsv
    missing_accessions: data/interim/tier3/mardb/missing.txt

  oceandna:
    figshare_collection: 5564844
    metadata_dir: data/metadata/tier3/OceanDNA
    out_dir: data/raw/tier3/oceandna
    interim_dir: data/interim/tier3/oceandna
    inventory_tsv: data/interim/tier3/oceandna/inventory.tsv
    files:
      reps:    {id: 29164842, name: fasta_species-representatives.tar, md5: 807b0f70c096ad740377e9e22c77b315}
      nonreps: {id: 29200011, name: fasta_non-representatives.tar, md5: c50cd5c886441990ad46bf5cf001c6d0}
      supp:    {id: 35080240, name: Supplement_revised.tar.gz}

  gomc:
    cngb_base: "https://ftp.cngb.org/pub/SciRAID/microbiomics/MDB0000002"
    metadata_dir: data/metadata/tier3/GOMC
    out_dir: data/raw/tier3/gomc
    interim_dir: data/interim/tier3/gomc
    inventory_tsv: data/interim/tier3/gomc/inventory.tsv
    files:
      - "24195.GOMC_genomes.tar.gz"
      - "43191.all_MAGs.tar.gz"
      - "md5.txt"

# ---------------------------------------------------------------------------
# Standardized genome layer
# ---------------------------------------------------------------------------
standardize:
  enabled: true
  out_root: data/interim/genomes
  fasta_dir: data/interim/genomes/fasta
  rosetta_tsv: data/interim/genomes/rosetta.tsv
  index_tsv: data/interim/genomes/index.tsv
  dedup_report_tsv: data/interim/genomes/dedup_report.tsv
  processed_index_tsv: data/processed/genome_index.tsv
  processed_rosetta_tsv: data/processed/genome_rosetta.tsv
  source_priority: [ncbi, marref, mardb, gomc, gorg, oceandna]
  compute_md5_seq: true
  parallel_workers: 8
